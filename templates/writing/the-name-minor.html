{% extends "base.html" %}

{% block content %}
<article>
  <h1>{{ page.title }}</h1>
  <div>{{ page.content | safe }}</div>

  {% for row in page.extra.rows %}
  <section class="two-col {% if row.flip %}two-col--flip{% endif %}">
    <div>{{ row.text | markdown | safe }}</div>
    <img src="{{ row.img }}" alt="{{ row.alt }}" />
  </section>
  {% endfor %}
</article>
{% endblock %}
