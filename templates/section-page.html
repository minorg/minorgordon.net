{% extends "base.html" %}
 
{% block content %}
  
<section class="two-col">
  <div>
    {% if section.title %}
    <h1>{{ section.title }}</h1>
    {% endif %}
    <div>
    {{ section.content | safe }}
    </div>
  </div>
  <img src="{{ get_url(path=section.extra.img.src) }}" alt="{{ section.extra.img.alt }}" />
</section>
 
{% endblock %}
